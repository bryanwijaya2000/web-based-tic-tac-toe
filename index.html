<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div id="gameArea">
        <div id="gameBoard">
            <table id="board" border="1">
                <tr>
                    <td>
                        <button class="cell" id="00" onclick="PlayerMove(0, 0)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="01" onclick="PlayerMove(0, 1)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="02" onclick="PlayerMove(0, 2)" disabled></button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="cell" id="10" onclick="PlayerMove(1, 0)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="11" onclick="PlayerMove(1, 1)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="12" onclick="PlayerMove(1, 2)" disabled></button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="cell" id="20" onclick="PlayerMove(2, 0)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="21" onclick="PlayerMove(2, 1)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="22" onclick="PlayerMove(2, 2)" disabled></button>
                    </td>
                </tr>
            </table>
        </div>
        <div id="pre-game">
            <div id="choosePieceLbl">Toggle to choose piece:</div>
            <button id="choosePieceBtn" onclick="TogglePiece()">X</button>
            <button id="startBtn" onclick="Start()">START</button>
        </div>
    </div>
</body>
</html>
